# hibi-no-daidokoro/.codex/config.toml
# 方針:
# - Codex本体の一般ネットワークはOFF
# - GitHub操作は GitHub MCP 経由のみ
# - GitHub MCP では PR 作成・更新だけ許可する
# - push はローカル git を使う
# - Notion は read-only 専用 integration token を使う local MCP に限定する

web_search = "disabled"

[sandbox_workspace_write]
network_access = false

# -----------------------------
# GitHub MCP
# -----------------------------
[mcp_servers.github]
command = "docker"
args = [
  "run", "-i", "--rm",
  "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
  "ghcr.io/github/github-mcp-server"
]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN"]
enabled_tools = ["create_pull_request", "update_pull_request"]
startup_timeout_sec = 20
tool_timeout_sec = 60
required = false

# -----------------------------
# Notion MCP (local / read-only token)
# -----------------------------
[mcp_servers.notion]
command = "docker"
args = [
  "run", "--rm", "-i",
  "-e", "NOTION_TOKEN",
  "mcp/notion"
]
env_vars = ["NOTION_TOKEN"]

enabled_tools = [
  "mcp__notion__API-get-block-children",
  "mcp__notion__API-get-self",
  "mcp__notion__API-post-search",
  "mcp__notion__API-query-data-source",
  "mcp__notion__API-retrieve-a-block",
  "mcp__notion__API-retrieve-a-data-source",
  "mcp__notion__API-retrieve-a-database",
  "mcp__notion__API-retrieve-a-page",
  "mcp__notion__API-retrieve-a-page-property"
]

startup_timeout_sec = 20
tool_timeout_sec = 60
required = false
