<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Login</title>
  </head>
  <body>
    <h1>ログイン</h1>

    {% if form.non_field_errors %}
      <div>
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label for="id_login_id">ログインID</label>
        {{ form.login_id }}
        {{ form.login_id.errors }}
      </div>
      <div>
        <label for="id_password">パスワード</label>
        {{ form.password }}
        {{ form.password.errors }}
      </div>
      <button type="submit">ログイン</button>
    </form>

    <p><a href="/signup/">サインアップへ</a></p>
  </body>
</html>
