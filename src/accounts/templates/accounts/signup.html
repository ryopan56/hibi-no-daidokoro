<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Signup</title>
  </head>
  <body>
    <h1>サインアップ</h1>

    {% if form.non_field_errors %}
      <div>
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label for="id_login_id">ログインID</label>
        {{ form.login_id }}
        {{ form.login_id.errors }}
      </div>
      <div>
        <label for="id_password1">パスワード</label>
        {{ form.password1 }}
        {{ form.password1.errors }}
      </div>
      <div>
        <label for="id_password2">パスワード（確認）</label>
        {{ form.password2 }}
        {{ form.password2.errors }}
      </div>
      <button type="submit">登録</button>
    </form>

    <p><a href="/login/">ログインへ</a></p>
  </body>
</html>
