{% extends "base.html" %}

{% block title %}通知設定{% endblock %}

{% block shell_title %}通知設定{% endblock %}

{% block shell_intro %}
  <p class="ui-shell-header__intro">
    高頻度ではない設定は、右上の設定ハブ側で静かに扱う前提です。
  </p>
{% endblock %}

{% block content %}
  <section class="ui-form-card">
    <form class="ui-form" method="post">
      {% csrf_token %}
      <label class="ui-list-row">
        <span class="ui-list-row__date">アプリ内通知を表示する</span>
        {{ form.notifications_enabled }}
      </label>
      <label class="ui-list-row">
        <span class="ui-list-row__date">週次肯定を表示する</span>
        {{ form.weekly_praise_enabled }}
      </label>
      <button class="ui-button" type="submit">保存する</button>
    </form>
  </section>
{% endblock %}
