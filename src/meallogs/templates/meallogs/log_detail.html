<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>MealLog</title>
  </head>
  <body>
    <h1>食事ログ</h1>
    <p>日付: {{ log_date }}</p>

    {% if form.non_field_errors %}
      <div>
        {{ form.non_field_errors }}
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div>
        <label for="id_time_minutes">時間(分)</label>
        {{ form.time_minutes }}
        {{ form.time_minutes.errors }}
      </div>
      <div>
        <label for="id_taste_level">味の満足度</label>
        {{ form.taste_level }}
        {{ form.taste_level.errors }}
      </div>
      <button type="submit">保存</button>
    </form>
  </body>
</html>
